<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BioDigital | Particle Depth Ontology</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VisualDataset",
      "name": "3D Depth Particle Field",
      "description": "A WebGL2 simulation mapping 5,000 entities to a 3D coordinate system with depth-based color interpolation.",
      "variableMeasured": [
        { "@type": "PropertyValue", "name": "Yaw", "unitCode": "RAD" },
        { "@type": "PropertyValue", "name": "Pitch", "unitCode": "RAD" },
        { "@type": "PropertyValue", "name": "ColorDepthFactor", "value": "50.0" }
      ]
    }
    </script>

    <style>
        :root {
            --ui-cyan: #00f2ff;
            --ui-bg: #000005;
        }
        html, body {
            margin: 0; height: 100%; overflow: hidden;
            background: var(--ui-bg); touch-action: none; 
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* Semantic HUD Components */
        header {
            position: fixed; top: 20px; left: 20px; z-index: 10;
            border-left: 2px solid var(--ui-cyan); padding-left: 15px;
            pointer-events: none;
        }
        .hud-label {
            font-size: 10px; color: var(--ui-cyan); text-transform: uppercase;
            letter-spacing: 2px; opacity: 0.8;
        }
        .hud-value { font-size: 18px; color: #fff; margin-bottom: 10px; }

        /* Hidden Table for Web Crawlers / Screen Readers */
        .semantic-bridge {
            position: absolute; width: 1px; height: 1px; padding: 0;
            margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;
        }
    </style>
</head>
<body>

    <header>
        <section aria-label="Simulation Metadata">
            <div class="hud-label">Subject</div>
            <div class="hud-value">Stellar_Cloud_V5</div>
            
            <div class="hud-label">Linked_Data_URI</div>
            <div class="hud-value" style="font-size: 10px;">http://data.biodigital.io/particles/5k</div>
        </section>
        
        <section aria-label="Real-time Metrics">
            <div class="hud-label">Color_Depth_Factor</div>
            <div id="depth-val" class="hud-value">50.0</div>
        </section>
    </header>

    <main role="main">
        <canvas id="glcanvas" aria-label="3D Interactive Particle Field"></canvas>
    </main>

    <article class="semantic-bridge" aria-live="polite">
        <h2>Dataset Statistics</h2>
        <p>Current View Coordinates: <span id="sem-coords">Yaw: 0, Pitch: 0</span></p>
        <p>Entities Rendered: 5,000 Points</p>
    </article>

    <footer style="position:fixed; bottom:10px; right:10px; color:var(--ui-cyan); font-size:9px; opacity:0.5;">
        [WEBGL2_CORE] // [SEMANTIC_ENHANCED]
    </footer>

<script type="module">
const canvas = document.getElementById('glcanvas');
const depthDisplay = document.getElementById('depth-val');
const semCoords = document.getElementById('sem-coords');
const gl = canvas.getContext('webgl2', { antialias: false });

if (!gl) alert('WebGL2 not supported');

function resizeCanvas() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
}
resizeCanvas(); 
window.addEventListener('resize', resizeCanvas);

// --- Shaders ---
const vsSource = `#version 300 es
precision highp float;
in vec3 aPos;
uniform mat4 uProjection, uView;
uniform float uPointSize;
out float vDepth;
void main() {
    vec4 viewPos = uView * vec4(aPos, 1.0);
    vDepth = -viewPos.z;
    gl_Position = uProjection * viewPos;
    gl_PointSize = uPointSize / (vDepth * 0.2);
}
`;

const fsSource = `#version 300 es
precision highp float;
in float vDepth;
uniform float uColorDepthFactor; 
out vec4 fragColor;
void main() {
    float t = clamp(vDepth / uColorDepthFactor, 0.0, 1.0);
    vec3 col = mix(vec3(0.0, 0.95, 1.0), vec3(1.0, 0.0, 0.5), t); // Cyan to Magenta
    float dist = length(gl_PointCoord - vec2(0.5));
    float alpha = smoothstep(0.5, 0.2, dist);
    fragColor = vec4(col, alpha);
}
`;

// [Shader Compilation omitted for brevity, remains same as your original]
function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vsSource));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(prog);
gl.useProgram(prog);

// --- Data Population ---
const numParticles = 5000;
const positions = new Float32Array(numParticles * 3);
for (let i = 0; i < numParticles * 3; i++) positions[i] = (Math.random() - 0.5) * 40;

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 3, gl.FLOAT, false, 0, 0);

const uProjection = gl.getUniformLocation(prog, 'uProjection');
const uView = gl.getUniformLocation(prog, 'uView');
const uPointSize = gl.getUniformLocation(prog, 'uPointSize');
const uColorDepthFactor = gl.getUniformLocation(prog, 'uColorDepthFactor');

// --- State & Interaction ---
let yaw = 0, pitch = 0, distance = 60, colorDepthFactor = 50.0;
let dragging = false, lastX = 0, lastY = 0;

// Update Semantic DOM (The Bridge)
function syncSemanticState() {
    depthDisplay.innerText = colorDepthFactor.toFixed(1);
    semCoords.innerText = `Yaw: ${yaw.toFixed(2)}, Pitch: ${pitch.toFixed(2)}`;
}

canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
    if (dragging) {
        yaw += (e.clientX - lastX) * 0.005;
        pitch += (e.clientY - lastY) * 0.005;
        lastX = e.clientX; lastY = e.clientY;
        syncSemanticState();
    }
});
canvas.addEventListener('wheel', e => {
    if (e.ctrlKey) {
        e.preventDefault();
        colorDepthFactor = Math.max(1, Math.min(200, colorDepthFactor + e.deltaY * 0.1));
    } else {
        distance = Math.max(10, Math.min(200, distance + e.deltaY * 0.05));
    }
    syncSemanticState();
}, {passive: false});

// --- Math Helpers ---
function mat4Perspective(out, fov, aspect, near, far) {
    const f = 1.0 / Math.tan(fov / 2);
    out.fill(0);
    out[0] = f / aspect; out[5] = f; out[10] = (far + near) / (near - far);
    out[11] = -1; out[14] = (2 * far * near) / (near - far);
    return out;
}
function mat4LookAt(out, eye, center, up) {
    const f = normalize(sub(center, eye)), s = normalize(cross(f, up)), u = cross(s, f);
    out[0] = s[0]; out[1] = u[0]; out[2] = -f[0]; out[3] = 0;
    out[4] = s[1]; out[5] = u[1]; out[6] = -f[1]; out[7] = 0;
    out[8] = s[2]; out[9] = u[2]; out[10] = -f[2]; out[11] = 0;
    out[12] = -dot(s, eye); out[13] = -dot(u, eye); out[14] = dot(f, eye); out[15] = 1;
    return out;
}
function sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function dot(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function normalize(a) { const l=Math.hypot(...a); return [a[0]/l,a[1]/l,a[2]/l]; }

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

function animate() {
    requestAnimationFrame(animate);
    gl.clear(gl.COLOR_BUFFER_BIT);
    
    const aspect = canvas.width / canvas.height;
    const projection = mat4Perspective(new Float32Array(16), Math.PI/4, aspect, 0.1, 500);
    const eye = [
        distance * Math.cos(pitch) * Math.sin(yaw),
        distance * Math.sin(pitch),
        distance * Math.cos(pitch) * Math.cos(yaw)
    ];
    const view = mat4LookAt(new Float32Array(16), eye, [0,0,0], [0,1,0]);
    
    gl.uniformMatrix4fv(uProjection, false, projection);
    gl.uniformMatrix4fv(uView, false, view);
    gl.uniform1f(uPointSize, 150.0);
    gl.uniform1f(uColorDepthFactor, colorDepthFactor); 
    
    gl.bindVertexArray(vao);
    gl.drawArrays(gl.POINTS, 0, numParticles);
}
animate();
</script>
</body>
</html>
